[pytest]
# Pytest配置文件

# 测试文件发现规则
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 输出选项
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings
    --alluredir=allure-results

# 标记定义
markers =
    smoke: 冒烟测试
    regression: 回归测试
    critical: 关键业务流程
    api: API接口测试
    ui: UI界面测试
    slow: 慢速测试
    integration: 集成测试

# 超时设置
timeout = 300

# 日志
log_cli = false
log_cli_level = INFO
log_file = logs/pytest.log
log_file_level = DEBUG
